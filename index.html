
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Infinity Neon Draw</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: sans-serif; }
        #canvas_bg { position: absolute; top: 0; left: 0; z-index: 1; width: 100vw; height: 100vh; filter: brightness(0.6); }
        #canvas_draw { position: absolute; top: 0; left: 0; z-index: 2; width: 100vw; height: 100vh; pointer-events: none; }
        .ui { position: fixed; top: 20px; left: 20px; z-index: 100; display: none; gap: 10px; }
        button { 
            background: white; border: none; padding: 12px 25px; 
            border-radius: 30px; font-weight: bold; color: black;
            box-shadow: 0 0 15px rgba(255,255,255,0.4);
        }
        #startBtn { 
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); 
            z-index: 200; background: linear-gradient(45deg, #ff0077, #00f2ff); 
            color: white; padding: 20px 40px; border-radius: 50px; font-size: 1.2rem; border: none;
        }
    </style>
</head>
<body>

    <button id="startBtn">ACTIVATE MAGIC DRAW</button>
    
    <div class="ui" id="ui_layer">
        <button onclick="clearCanvas()">CLEAR</button>
        <button onclick="location.reload()">RELOAD</button>
    </div>

    <video id="video" playsinline></video>
    <canvas id="canvas_bg"></canvas>
    <canvas id="canvas_draw"></canvas>

    <script>
        const video = document.getElementById('video');
        const canvasBg = document.getElementById('canvas_bg');
        const canvasDraw = document.getElementById('canvas_draw');
        const ctxBg = canvasBg.getContext('2d');
        const ctxDraw = canvasDraw.getContext('2d');
        const startBtn = document.getElementById('startBtn');
        const uiLayer = document.getElementById('ui_layer');

        let lastX, lastY, hue = 0;
        let isFirstPoint = true;

        function resize() {
            canvasBg.width = canvasDraw.width = window.innerWidth;
            canvasBg.height = canvasDraw.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        function clearCanvas() {
            ctxDraw.clearRect(0, 0, canvasDraw.width, canvasDraw.height);
            isFirstPoint = true;
        }

        function onResults(results) {
            ctxBg.save();
            ctxBg.clearRect(0, 0, canvasBg.width, canvasBg.height);
            ctxBg.translate(canvasBg.width, 0);
            ctxBg.scale(-1, 1);
            ctxBg.drawImage(results.image, 0, 0, canvasBg.width, canvasBg.height);

            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                const landmarks = results.multiHandLandmarks[0];
                
                // Draw cool thin tracking lines
                drawConnectors(ctxBg, landmarks, HAND_CONNECTIONS, {color: 'rgba(255,255,255,0.5)', lineWidth: 2});

                // Get Index Tip position
                const x = (1 - landmarks[8].x) * canvasDraw.width;
                const y = landmarks[8].y * canvasDraw.height;

                // --- UNIQUE DRAWING STYLE ---
                if (isFirstPoint) {
                    lastX = x; lastY = y;
                    isFirstPoint = false;
                }

                ctxDraw.beginPath();
                ctxDraw.lineCap = 'round';
                ctxDraw.lineJoin = 'round';
                
                // Dynamic unique thickness based on speed (simulated by movement)
                const dist = Math.hypot(x - lastX, y - lastY);
                ctxDraw.lineWidth = Math.min(25, Math.max(8, dist * 2));

                // Rainbow Neon Cycle
                hue = (hue + 2) % 360; 
                const color = `hsl(${hue}, 100%, 60%)`;
                
                ctxDraw.shadowBlur = 20;
                ctxDraw.shadowColor = color;
                ctxDraw.strokeStyle = 'white'; // White center makes it look like a tube
                
                ctxDraw.moveTo(lastX, lastY);
                ctxDraw.lineTo(x, y);
                ctxDraw.stroke();

                lastX = x;
                lastY = y;
            } else {
                // Reset point when hand is lost so it doesn't "jump" across screen
                isFirstPoint = true;
            }
            ctxBg.restore();
        }

        const hands = new Hands({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`});
        hands.setOptions({ maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.5, minTrackingConfidence: 0.5 });
        hands.onResults(onResults);

        startBtn.onclick = () => {
            const camera = new Camera(video, {
                onFrame: async () => { await hands.send({image: video}); },
                width: 1280, height: 720, facingMode: 'user'
            });
            camera.start();
            startBtn.style.display = 'none';
            uiLayer.style.display = 'flex';
        };
    </script>
</body>
</html>
