<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Neon Air Draw</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: sans-serif; }
        canvas { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; }
        #video { display: none; }
        .controls { position: fixed; top: 10px; left: 10px; z-index: 100; display: flex; gap: 10px; }
        button { background: #00f2ff; border: none; padding: 12px 20px; border-radius: 8px; font-weight: bold; color: black; box-shadow: 0 0 10px #00f2ff; }
        #startBtn { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); padding: 20px 40px; font-size: 1.2rem; }
    </style>
</head>
<body>

    <button id="startBtn">TAP TO START CAMERA</button>
    
    <div class="controls" id="ui" style="display:none;">
        <button onclick="location.reload()">Reset All</button>
        <button onclick="clearCanvas()">Clear Drawing</button>
    </div>

    <video id="video" playsinline></video>
    <canvas id="canvas_bg"></canvas>
    <canvas id="canvas_draw"></canvas>

    <script>
        const video = document.getElementById('video');
        const canvasBg = document.getElementById('canvas_bg');
        const canvasDraw = document.getElementById('canvas_draw');
        const ctxBg = canvasBg.getContext('2d');
        const ctxDraw = canvasDraw.getContext('2d');
        const startBtn = document.getElementById('startBtn');
        const ui = document.getElementById('ui');

        let lastX, lastY, isDrawing = false;

        function resize() {
            canvasBg.width = canvasDraw.width = window.innerWidth;
            canvasBg.height = canvasDraw.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        function clearCanvas() {
            ctxDraw.clearRect(0, 0, canvasDraw.width, canvasDraw.height);
        }

        // --- THIS IS THE ONRESULTS FUNCTION ---
        function onResults(results) {
            ctxBg.save();
            ctxBg.clearRect(0, 0, canvasBg.width, canvasBg.height);
            
            // Mirror the video to act like a real mirror
            ctxBg.translate(canvasBg.width, 0);
            ctxBg.scale(-1, 1);
            ctxBg.drawImage(results.image, 0, 0, canvasBg.width, canvasBg.height);

            if (results.multiHandLandmarks) {
                for (const landmarks of results.multiHandLandmarks) {
                    // Draw tracking lines on hand
                    drawConnectors(ctxBg, landmarks, HAND_CONNECTIONS, {color: '#00f2ff', lineWidth: 4});
                    drawLandmarks(ctxBg, landmarks, {color: '#ff0077', lineWidth: 1, radius: 4});

                    // Drawing Logic
                    const indexTip = landmarks[8];
                    const indexBase = landmarks[6];
                    
                    // Match coordinates to the mirrored screen
                    const x = (1 - indexTip.x) * canvasDraw.width;
                    const y = indexTip.y * canvasDraw.height;

                    // Gesture: Index finger point up = Draw
                    if (indexTip.y < indexBase.y) {
                        if (!isDrawing) {
                            isDrawing = true;
                            lastX = x; lastY = y;
                        }
                        ctxDraw.beginPath();
                        ctxDraw.lineCap = 'round';
                        ctxDraw.lineWidth = 15;
                        ctxDraw.shadowBlur = 20;
                        ctxDraw.shadowColor = '#00f2ff';
                        ctxDraw.strokeStyle = 'white';
                        ctxDraw.moveTo(lastX, lastY);
                        ctxDraw.lineTo(x, y);
                        ctxDraw.stroke();
                        lastX = x; lastY = y;
                    } else {
                        isDrawing = false;
                    }
                }
            }
            ctxBg.restore();
        }

        const hands = new Hands({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`});
        hands.setOptions({ maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.6, minTrackingConfidence: 0.6 });
        hands.onResults(onResults);

        startBtn.onclick = () => {
            const camera = new Camera(video, {
                onFrame: async () => { await hands.send({image: video}); },
                width: 1280, height: 720, facingMode: 'user'
            });
            camera.start();
            startBtn.style.display = 'none';
            ui.style.display = 'flex';
        };
    </script>
</body>
</html>
